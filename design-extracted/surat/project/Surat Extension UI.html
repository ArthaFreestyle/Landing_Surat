<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<title>Surat — Extension UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: "Söhne", "Inter", "Helvetica Neue", Helvetica, system-ui, sans-serif; color: #2a251f; }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="popup-shell.jsx"></script>
<script type="text/babel" src="popup-screens.jsx"></script>
<script type="text/babel" src="popup-app.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="hero"
        title="Surat — Chrome Side Panel"
        subtitle="AI form-filler untuk dokumen Indonesia · docked sidebar · warm minimal (krem hangat, serif display, accent terracotta)"
      >
        <DCArtboard id="interactive" label="Interactive prototype · klik dot di bawah" width={1140} height={720}>
          <BrowserContext>
            <InteractivePopup />
          </BrowserContext>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="flow"
        title="Alur lengkap"
        subtitle="6 state dari onboarding sampai autofill selesai"
      >
        <DCArtboard id="login" label="01 · Login" width={380} height={720}>
          <PopupFrame>
            <ScreenLogin />
          </PopupFrame>
        </DCArtboard>
        <DCArtboard id="main" label="02 · Upload (empty)" width={380} height={720}>
          <PopupFrame>
            <ScreenMain />
          </PopupFrame>
        </DCArtboard>
        <DCArtboard id="dragover" label="03 · Drag over" width={380} height={720}>
          <PopupFrame>
            <ScreenMain dragOver={true} />
          </PopupFrame>
        </DCArtboard>
        <DCArtboard id="processing" label="04 · Processing" width={380} height={720}>
          <PopupFrame>
            <ScreenProcessing stage={1} />
          </PopupFrame>
        </DCArtboard>
        <DCArtboard id="preview" label="05 · Preview &amp; edit" width={380} height={720}>
          <PopupFrame>
            <ScreenPreview />
          </PopupFrame>
        </DCArtboard>
        <DCArtboard id="success" label="06 · Autofill selesai" width={380} height={720}>
          <PopupFrame>
            <ScreenSuccess />
          </PopupFrame>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="system"
        title="Sistem visual"
        subtitle="Token warna, type pairing, dan komponen dasar"
      >
        <DCArtboard id="tokens" label="Color &amp; type tokens" width={520} height={420}>
          <TokenSheet />
        </DCArtboard>
        <DCArtboard id="components" label="Komponen" width={520} height={420}>
          <ComponentSheet />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// Small design-system reference card
function TokenSheet() {
  const swatches = [
    { name: 'popup bg', v: SURAT.popupBg },
    { name: 'card',     v: SURAT.card },
    { name: 'card alt', v: SURAT.cardAlt },
    { name: 'ink',      v: SURAT.ink },
    { name: 'ink-2',    v: SURAT.ink2 },
    { name: 'accent',   v: SURAT.accent },
    { name: 'accent soft', v: SURAT.accentSoft },
    { name: 'success',  v: SURAT.success },
    { name: 'warning',  v: SURAT.warning },
    { name: 'border',   v: SURAT.border },
  ];
  return (
    <div style={{ width: '100%', height: '100%', background: SURAT.popupBg, padding: 24, fontFamily: SURAT.sans, color: SURAT.ink, overflow: 'hidden' }}>
      <div className="sx-serif" style={{ fontSize: 22, fontWeight: 500, letterSpacing: '-0.02em' }}>Palet warna</div>
      <div style={{ fontSize: 11, color: SURAT.ink3, marginBottom: 12 }}>Warm cream · terracotta accent · sage success</div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8, marginBottom: 22 }}>
        {swatches.map(s => (
          <div key={s.name}>
            <div style={{
              height: 42, borderRadius: 7, background: s.v,
              boxShadow: 'inset 0 0 0 1px rgba(0,0,0,0.06)',
            }}/>
            <div style={{ fontSize: 10, color: SURAT.ink2, marginTop: 4 }}>{s.name}</div>
            <div className="sx-mono" style={{ fontSize: 9.5, color: SURAT.ink3 }}>{s.v}</div>
          </div>
        ))}
      </div>

      <div className="sx-serif" style={{ fontSize: 22, fontWeight: 500, letterSpacing: '-0.02em' }}>Type pairing</div>
      <div style={{ fontSize: 11, color: SURAT.ink3, marginBottom: 12 }}>Source Serif 4 (display) · system sans (UI) · JetBrains Mono (data)</div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <div className="sx-serif" style={{ fontSize: 30, fontWeight: 500, lineHeight: 1.1 }}>
          Isi form, <span style={{ fontStyle: 'italic', color: SURAT.accent }}>tanpa</span> ketik ulang.
        </div>
        <div style={{ fontSize: 13.5, color: SURAT.ink2 }}>
          Body — Surat baca dokumen Anda, lalu petakan ke field form yang sedang dibuka.
        </div>
        <div className="sx-mono" style={{ fontSize: 12, color: SURAT.ink2 }}>NIK · 3271 0643 0592 0003</div>
      </div>
    </div>
  );
}

function ComponentSheet() {
  return (
    <div style={{ width: '100%', height: '100%', background: SURAT.popupBg, padding: 24, fontFamily: SURAT.sans, color: SURAT.ink, overflow: 'hidden' }}>
      <div className="sx">
        <div className="sx-serif" style={{ fontSize: 22, fontWeight: 500, letterSpacing: '-0.02em', color: SURAT.ink }}>Komponen</div>
        <div style={{ fontSize: 11, color: SURAT.ink3, marginBottom: 14 }}>Building blocks yang dipakai di seluruh flow</div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div>
            <div className="sx-label" style={{ marginBottom: 6 }}>Tombol</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="sx-btn sx-btn-primary" style={{ width: 'auto' }}>Isi form</button>
              <button className="sx-btn sx-btn-secondary" style={{ width: 'auto' }}>Ubah dokumen</button>
              <button className="sx-btn sx-btn-ghost" style={{ width: 'auto' }}>Batal</button>
            </div>
          </div>

          <div>
            <div className="sx-label" style={{ marginBottom: 6 }}>Input</div>
            <input className="sx-input" placeholder="email@anda.com" />
          </div>

          <div>
            <div className="sx-label" style={{ marginBottom: 6 }}>Chips (tipe dokumen)</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              <span className="sx-chip active">KTP</span>
              <span className="sx-chip">NPWP</span>
              <span className="sx-chip">KK</span>
              <span className="sx-chip">Ijazah</span>
            </div>
          </div>

          <div>
            <div className="sx-label" style={{ marginBottom: 6 }}>Status pill</div>
            <div style={{ display: 'flex', gap: 6 }}>
              <span style={{ padding: '3px 8px', borderRadius: 999, background: SURAT.successSoft, color: '#3d5a2e', fontSize: 11 }}>Terisi · 11</span>
              <span style={{ padding: '3px 8px', borderRadius: 999, background: SURAT.warningSoft, color: SURAT.warning, fontSize: 11 }}>Perlu cek · 2</span>
              <span style={{ padding: '3px 8px', borderRadius: 999, background: SURAT.cardAlt, color: SURAT.ink2, fontSize: 11 }}>Tidak dikenali · 1</span>
            </div>
          </div>

          <div>
            <div className="sx-label" style={{ marginBottom: 6 }}>Confidence indicator</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, fontSize: 11 }}>
              {[
                { l: 'Nama lengkap',   v: 'BUDI SANTOSO',   c: 0.98, color: SURAT.success },
                { l: 'Alamat',         v: 'Jl. Merdeka …',  c: 0.88, color: SURAT.ink2 },
                { l: 'Pekerjaan',      v: 'Karyawan Swasta',c: 0.62, color: SURAT.warning },
              ].map(r => (
                <div key={r.l} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <span style={{ width: 100, color: SURAT.ink3 }}>{r.l}</span>
                  <span style={{ flex: 1, color: SURAT.ink, fontWeight: 500 }}>{r.v}</span>
                  <span className="sx-mono" style={{ color: r.color, fontSize: 10.5 }}>{r.c.toFixed(2)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
